<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI海龟汤 - 游戏对话</title>
    <style>
      :root {
        --bg0: #040916;
        --bg1: #0a1b3a;
        --panel: rgba(8, 21, 45, 0.78);
        --panel-2: rgba(5, 14, 32, 0.88);
        --line: rgba(148, 193, 255, 0.2);
        --text: #e7f1ff;
        --muted: rgba(231, 241, 255, 0.72);
        --yes: #3ecf8e;
        --no: #ff7c96;
        --na: #f5b84b;
        --accent: #59a8ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background:
          radial-gradient(1000px 700px at 15% 10%, rgba(89, 168, 255, 0.2), transparent 58%),
          radial-gradient(900px 700px at 85% 18%, rgba(141, 108, 255, 0.14), transparent 60%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
        overflow: hidden;
      }

      .stars {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 8% 22%, rgba(255, 255, 255, 0.16) 0 1px, transparent 1.4px),
          radial-gradient(circle at 30% 70%, rgba(255, 255, 255, 0.13) 0 1px, transparent 1.4px),
          radial-gradient(circle at 58% 16%, rgba(255, 255, 255, 0.15) 0 1px, transparent 1.4px),
          radial-gradient(circle at 76% 44%, rgba(255, 255, 255, 0.12) 0 1px, transparent 1.4px),
          radial-gradient(circle at 92% 74%, rgba(255, 255, 255, 0.14) 0 1px, transparent 1.4px);
        opacity: 0.9;
      }

      .wrap {
        height: 100%;
        max-width: 1180px;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 14px;
      }

      @media (max-width: 960px) {
        body {
          overflow: auto;
        }
        .wrap {
          height: auto;
          min-height: 100%;
          grid-template-columns: 1fr;
          padding-bottom: 24px;
        }
      }

      .panel {
        border: 1px solid var(--line);
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border-radius: 16px;
        backdrop-filter: blur(2px);
      }

      .side {
        padding: 16px;
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .title {
        margin: 0;
        font-size: clamp(24px, 3vw, 32px);
        line-height: 1.2;
        text-shadow: 0 0 14px rgba(89, 168, 255, 0.5);
      }

      .title small {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 500;
      }

      .story {
        border: 1px solid rgba(148, 193, 255, 0.2);
        border-radius: 12px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.03);
      }

      .story h3 {
        margin: 0 0 8px;
        font-size: 14px;
        color: rgba(231, 241, 255, 0.9);
      }

      .story p {
        margin: 0;
        color: rgba(231, 241, 255, 0.86);
        line-height: 1.7;
        font-size: 14px;
      }

      .truth {
        border: 1px dashed rgba(148, 193, 255, 0.3);
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(8, 20, 40, 0.6);
      }

      .truth strong {
        font-size: 13px;
      }

      .truth p {
        margin: 8px 0 0;
        line-height: 1.6;
        font-size: 14px;
        color: rgba(231, 241, 255, 0.9);
      }

      .hidden {
        display: none !important;
      }

      .btnRow {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .btn {
        border: 1px solid rgba(89, 168, 255, 0.55);
        background: linear-gradient(180deg, rgba(89, 168, 255, 0.28), rgba(89, 168, 255, 0.08));
        color: var(--text);
        border-radius: 11px;
        padding: 10px 12px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.34);
        border-color: rgba(89, 168, 255, 0.8);
      }

      .rules {
        margin: 0;
        padding: 0 0 0 18px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 13px;
      }

      .prompts {
        border: 1px solid rgba(148, 193, 255, 0.2);
        border-radius: 12px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.03);
      }

      .prompts h3 {
        margin: 0 0 8px;
        font-size: 13px;
        color: rgba(231, 241, 255, 0.92);
      }

      .promptList {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .promptBtn {
        border: 1px solid rgba(89, 168, 255, 0.45);
        border-radius: 999px;
        background: rgba(89, 168, 255, 0.1);
        color: rgba(231, 241, 255, 0.92);
        padding: 5px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .promptBtn:hover {
        border-color: rgba(89, 168, 255, 0.78);
      }

      .chat {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 0;
      }

      .chatHead {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(148, 193, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .chatHead h2 {
        margin: 0;
        font-size: 18px;
      }

      .badge {
        font-size: 12px;
        color: var(--muted);
      }

      .messages {
        overflow: auto;
        padding: 16px;
        display: grid;
        align-content: start;
        gap: 10px;
      }

      .msg {
        max-width: min(760px, 95%);
        padding: 11px 12px;
        border-radius: 12px;
        line-height: 1.6;
        font-size: 14px;
        border: 1px solid rgba(148, 193, 255, 0.2);
      }

      .msg.ai {
        justify-self: start;
        background: rgba(255, 255, 255, 0.04);
      }

      .msg.player {
        justify-self: end;
        background: rgba(89, 168, 255, 0.15);
        border-color: rgba(89, 168, 255, 0.28);
      }

      .msg .role {
        display: block;
        font-size: 12px;
        margin-bottom: 4px;
        color: var(--muted);
      }

      .judge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 1px 8px;
        margin-right: 6px;
        font-size: 12px;
        border: 1px solid transparent;
      }

      .judge.yes {
        color: var(--yes);
        border-color: rgba(62, 207, 142, 0.4);
      }

      .judge.no {
        color: var(--no);
        border-color: rgba(255, 124, 150, 0.45);
      }

      .judge.na {
        color: var(--na);
        border-color: rgba(245, 184, 75, 0.45);
      }

      .composer {
        border-top: 1px solid rgba(148, 193, 255, 0.15);
        padding: 12px;
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
      }

      .input {
        border: 1px solid rgba(148, 193, 255, 0.24);
        background: rgba(0, 0, 0, 0.2);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        min-height: 42px;
      }

      .input:focus {
        outline: none;
        border-color: rgba(89, 168, 255, 0.75);
      }

      .send {
        padding: 0 14px;
        min-width: 88px;
      }

      .voice {
        min-width: 104px;
      }

      .voice.recording {
        border-color: rgba(245, 184, 75, 0.95);
        background: linear-gradient(180deg, rgba(245, 184, 75, 0.32), rgba(245, 184, 75, 0.1));
        box-shadow: 0 0 0 2px rgba(245, 184, 75, 0.15);
      }

      .voice[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="stars" aria-hidden="true"></div>
    <main class="wrap">
      <section class="panel side">
        <h1 class="title">🐢 AI海龟汤<small>主持人只会回答：是 / 否 / 无关</small></h1>

        <div class="story">
          <h3>当前汤面</h3>
          <p id="storyText">点击“换一题”，让 AI 给你出一个新汤面。</p>
        </div>

        <div class="truth hidden" id="truthBox">
          <strong>汤底（真相）</strong>
          <p id="truthText"></p>
        </div>

        <div class="btnRow">
          <button id="newPuzzleBtn" class="btn" type="button">换一题</button>
          <button id="toggleTruthBtn" class="btn" type="button">查看汤底</button>
        </div>

        <ol class="rules">
          <li>先阅读汤面，再连续提问缩小可能性。</li>
          <li>每次提问尽量具体，避免一次问多个问题。</li>
          <li>你可随时点击“查看汤底”验证自己的推理。</li>
        </ol>

        <div class="prompts">
          <h3>提问提示词（点一下自动填入）</h3>
          <div id="promptList" class="promptList"></div>
        </div>
      </section>

      <section class="panel chat">
        <header class="chatHead">
          <h2>对话区</h2>
          <span class="badge" id="countBadge">0 条消息</span>
        </header>
        <div class="messages" id="messages"></div>
        <form class="composer" id="askForm">
          <input
            id="questionInput"
            class="input"
            type="text"
            maxlength="140"
            placeholder="输入你的问题，例如：关键原因和天气有关吗？"
            autocomplete="off"
          />
          <button id="voiceBtn" class="btn voice" type="button">语音输入</button>
          <button class="btn send" type="submit">发送</button>
        </form>
      </section>
    </main>

    <script>
      /**
       * @typedef {"yes" | "no" | "na"} JudgeType
       */

      /**
       * @typedef {Object} Puzzle
       * @property {string} id
       * @property {string} surface
       * @property {string} truth
       * @property {string[]} yesKeywords
       * @property {string[]} noKeywords
       * @property {string[]} naKeywords
       * @property {string[]} promptQuestions
       */

      /**
       * 预置的海龟汤题库。
       * @type {Puzzle[]}
       */
      const PUZZLES = [
        {
          id: "p1",
          surface: "一名男子在餐厅喝了一口海龟汤后突然落泪，随后匆匆离开。",
          truth: "他年轻时在海上遇险，曾被人用“海龟汤”安慰。多年后再次喝到真正海龟汤，发现当年的味道完全不同，才意识到过去有人在极端环境下善意隐瞒了真相。",
          yesKeywords: ["海上", "遇险", "回忆", "味道", "真假", "隐瞒", "过去", "安慰"],
          noKeywords: ["中毒", "服务员故意", "超自然", "餐厅诈骗", "欠债", "抢劫"],
          naKeywords: ["灯光", "桌号", "价格", "餐具", "天气", "穿着"],
          promptQuestions: ["和过去经历有关吗？", "和海上事件有关吗？", "关键在汤的味道吗？", "有人故意欺骗他吗？"]
        },
        {
          id: "p2",
          surface: "一名女子每天都坐同一班电梯到 10 楼，下班时却总是走楼梯。",
          truth: "她个子矮，早上电梯里人多能按到 10 楼；晚上人少，她够不到 10 楼按钮，只能先到较低楼层再走楼梯。",
          yesKeywords: ["身高", "够不到", "按钮", "电梯", "楼层", "矮", "按键", "人多"],
          noKeywords: ["闹鬼", "电梯坏", "追杀", "疾病", "惩罚", "恐高", "地震"],
          naKeywords: ["工资", "婚姻", "老板", "城市", "季节", "天气"],
          promptQuestions: ["和她的身高有关吗？", "和电梯按钮有关吗？", "晚上和早上的差别重要吗？", "电梯本身是坏的吗？"]
        },
        {
          id: "p3",
          surface: "一个人打开冰箱看了一眼，立刻给同事打电话。",
          truth: "他是活动策划，发现第二天比赛的关键奖杯模型被放错位置，若不及时处理将影响直播流程，所以立刻联系团队紧急调整。",
          yesKeywords: ["工作", "同事", "活动", "比赛", "道具", "奖杯", "直播", "流程"],
          noKeywords: ["犯罪", "凶案", "闹鬼", "超能力", "中毒", "恶作剧"],
          naKeywords: ["冰箱品牌", "颜色", "价格", "大小", "口味"],
          promptQuestions: ["和他的工作任务有关吗？", "冰箱里是比赛相关物品吗？", "这个电话是为了紧急协调吗？", "和违法事件有关吗？"]
        },
        {
          id: "p4",
          surface: "一位乘客上车后什么都没说，只举起一张纸，司机就立刻让他免费乘车。",
          truth: "纸上写着“今天是我第一次独自出行，我有些紧张”，这是当地公益日活动的一部分。司机认出活动标识后配合并鼓励他。",
          yesKeywords: ["公益", "活动", "标识", "第一次", "紧张", "鼓励", "司机认识"],
          noKeywords: ["威胁", "抢劫", "车票丢失", "警察命令", "闹事"],
          naKeywords: ["车牌", "天气", "路线长短", "衣服颜色"],
          promptQuestions: ["和公益活动有关吗？", "纸上内容是求助信息吗？", "司机提前知道这件事吗？", "和乘客没买票有关吗？"]
        }
      ];

      /**
       * 聊天消息列表。
       * @type {{ role: "ai" | "player", text: string }[]}
       */
      const chatHistory = [];

      /** @type {Puzzle | null} */
      let currentPuzzle = null;
      let truthVisible = false;

      const storyText = document.getElementById("storyText");
      const truthText = document.getElementById("truthText");
      const truthBox = document.getElementById("truthBox");
      const messagesEl = document.getElementById("messages");
      const askForm = document.getElementById("askForm");
      const questionInput = document.getElementById("questionInput");
      const countBadge = document.getElementById("countBadge");
      const toggleTruthBtn = document.getElementById("toggleTruthBtn");
      const newPuzzleBtn = document.getElementById("newPuzzleBtn");
      const promptList = document.getElementById("promptList");
      const voiceBtn = document.getElementById("voiceBtn");
      const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;

      /** @type {SpeechRecognition | null} */
      let speechRecognizer = null;
      let isRecording = false;

      /**
       * 从题库随机选择一个汤面。
       * @returns {Puzzle}
       */
      function pickPuzzle() {
        const idx = Math.floor(Math.random() * PUZZLES.length);
        return PUZZLES[idx];
      }

      /**
       * 添加一条聊天消息并刷新视图。
       * @param {"ai" | "player"} role 消息角色
       * @param {string} text 消息内容
       * @returns {void}
       */
      function pushMessage(role, text) {
        chatHistory.push({ role, text });
        renderMessages();
      }

      /**
       * 渲染对话历史。
       * @returns {void}
       */
      function renderMessages() {
        messagesEl.innerHTML = "";

        for (const item of chatHistory) {
          const msg = document.createElement("article");
          msg.className = `msg ${item.role}`;

          const role = document.createElement("span");
          role.className = "role";
          role.textContent = item.role === "ai" ? "AI主持人" : "你";

          const body = document.createElement("div");
          body.innerHTML = item.text;

          msg.appendChild(role);
          msg.appendChild(body);
          messagesEl.appendChild(msg);
        }

        countBadge.textContent = `${chatHistory.length} 条消息`;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      /**
       * 根据关键词判断问题回答类型。
       * @param {string} question 玩家问题
       * @param {Puzzle} puzzle 当前题目
       * @returns {{ type: JudgeType, hint: string }}
       */
      function judgeQuestion(question, puzzle) {
        const q = question.trim().toLowerCase();

        if (!q) {
          return { type: "na", hint: "请先输入一个具体问题。" };
        }

        if (q.includes("汤底") || q.includes("真相") || q.includes("答案")) {
          return { type: "na", hint: "你可以点击左侧“查看汤底”直接查看真相。" };
        }

        const matchAny = (words) => words.some((w) => q.includes(w.toLowerCase()));

        if (matchAny(puzzle.yesKeywords)) {
          return { type: "yes", hint: "你的方向接近真相，建议继续细化条件。" };
        }

        if (matchAny(puzzle.noKeywords)) {
          return { type: "no", hint: "这个方向不成立，换个角度试试。" };
        }

        if (matchAny(puzzle.naKeywords)) {
          return { type: "na", hint: "该信息和核心真相关系不大。" };
        }

        const isClosedQuestion = /吗\?|吗$|是否|是不是|有没有|能不能|可不可以/.test(q);
        if (isClosedQuestion) {
          return { type: "no", hint: "暂不支持这个方向，建议从“人物身份/关键物品/时间差异”继续问。" };
        }

        return { type: "na", hint: "信息不足，暂时判断为无关。你可以问得更具体一些。" };
      }

      /**
       * 渲染当前题目的提问提示词按钮。
       * @param {Puzzle} puzzle 当前题目
       * @returns {void}
       */
      function renderPromptQuestions(puzzle) {
        if (!promptList) return;
        promptList.innerHTML = "";

        for (const q of puzzle.promptQuestions) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "promptBtn";
          btn.textContent = q;
          btn.addEventListener("click", () => {
            questionInput.value = q;
            questionInput.focus();
          });
          promptList.appendChild(btn);
        }
      }

      /**
       * 把判断结果组装为 AI 回复文本。
       * @param {JudgeType} type 结果类型
       * @param {string} hint 提示语
       * @returns {string}
       */
      function buildAiAnswer(type, hint) {
        if (type === "yes") {
          return `<span class="judge yes">是</span>${hint}`;
        }
        if (type === "no") {
          return `<span class="judge no">否</span>${hint}`;
        }
        return `<span class="judge na">无关</span>${hint}`;
      }

      /**
       * 开始新一局游戏并清空聊天记录。
       * @returns {void}
       */
      function startNewRound() {
        currentPuzzle = pickPuzzle();
        truthVisible = false;
        truthBox.classList.add("hidden");
        toggleTruthBtn.textContent = "查看汤底";
        storyText.textContent = currentPuzzle.surface;
        truthText.textContent = currentPuzzle.truth;
        renderPromptQuestions(currentPuzzle);
        chatHistory.length = 0;

        pushMessage("ai", "新汤面已发布，请开始提问。");
        pushMessage("ai", `汤面：${currentPuzzle.surface}`);
        pushMessage("ai", "你可以先从“人物身份、关键物品、时间差异”这三类问题入手。");
      }

      /**
       * 切换汤底显示状态。
       * @returns {void}
       */
      function toggleTruth() {
        truthVisible = !truthVisible;
        truthBox.classList.toggle("hidden", !truthVisible);
        toggleTruthBtn.textContent = truthVisible ? "隐藏汤底" : "查看汤底";
      }

      /**
       * 处理玩家发问并生成 AI 回答。
       * @param {SubmitEvent} event 表单提交事件
       * @returns {void}
       */
      function handleAsk(event) {
        event.preventDefault();
        const q = questionInput.value.trim();

        if (!currentPuzzle) {
          pushMessage("ai", "请先点击“换一题”，让 AI 出题。");
          return;
        }

        if (!q) return;

        pushMessage("player", q);
        questionInput.value = "";

        const result = judgeQuestion(q, currentPuzzle);
        const aiText = buildAiAnswer(result.type, result.hint);
        pushMessage("ai", aiText);
      }

      /**
       * 更新语音按钮展示状态。
       * @param {boolean} recording 是否正在录音
       * @returns {void}
       */
      function setVoiceButtonState(recording) {
        if (!voiceBtn) return;
        isRecording = recording;
        voiceBtn.classList.toggle("recording", recording);
        voiceBtn.textContent = recording ? "录音中..." : "语音输入";
      }

      /**
       * 初始化浏览器语音识别能力。
       * @returns {void}
       */
      function setupVoiceRecognition() {
        if (!voiceBtn) return;

        if (!SpeechRecognitionCtor) {
          voiceBtn.disabled = true;
          voiceBtn.textContent = "语音不可用";
          voiceBtn.title = "当前浏览器不支持语音识别，请使用 Chrome 或 Edge。";
          return;
        }

        speechRecognizer = new SpeechRecognitionCtor();
        speechRecognizer.lang = "zh-CN";
        speechRecognizer.interimResults = false;
        speechRecognizer.maxAlternatives = 1;

        speechRecognizer.onstart = () => {
          setVoiceButtonState(true);
          pushMessage("ai", "我在听，请说出你的问题。");
        };

        speechRecognizer.onresult = (event) => {
          const resultText = event.results?.[0]?.[0]?.transcript?.trim() || "";
          if (!resultText) return;
          questionInput.value = resultText;
          questionInput.focus();
        };

        speechRecognizer.onerror = () => {
          pushMessage("ai", "语音识别失败，请重试或直接手动输入。");
        };

        speechRecognizer.onend = () => {
          setVoiceButtonState(false);
        };
      }

      /**
       * 切换语音输入状态。
       * @returns {void}
       */
      function toggleVoiceInput() {
        if (!speechRecognizer) return;

        if (isRecording) {
          speechRecognizer.stop();
          return;
        }

        speechRecognizer.start();
      }

      /**
       * 绑定页面交互事件。
       * @returns {void}
       */
      function bindEvents() {
        askForm.addEventListener("submit", handleAsk);
        toggleTruthBtn.addEventListener("click", toggleTruth);
        newPuzzleBtn.addEventListener("click", startNewRound);
        if (voiceBtn) {
          voiceBtn.addEventListener("click", toggleVoiceInput);
        }
      }

      setupVoiceRecognition();
      bindEvents();
      startNewRound();
    </script>
  </body>
</html>
