<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI海龟汤 - 欢迎页</title>
    <style>
      :root {
        --bg0: #050a1a;
        --bg1: #071b3a;
        --card: rgba(10, 28, 57, 0.62);
        --card2: rgba(6, 16, 37, 0.55);
        --text: #e8f2ff;
        --muted: rgba(232, 242, 255, 0.76);
        --line: rgba(180, 210, 255, 0.18);
        --accent: #4aa3ff;
        --accent2: #7b61ff;
        --danger: #ff5a7a;
        --shadow: rgba(0, 0, 0, 0.55);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1100px 700px at 15% 10%, rgba(74, 163, 255, 0.18), transparent 55%),
          radial-gradient(900px 600px at 85% 25%, rgba(123, 97, 255, 0.14), transparent 55%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
        overflow-x: hidden;
      }

      /* 悬疑粒子/纹理背景（纯 CSS，无需图片） */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 10% 20%, rgba(74, 163, 255, 0.18), transparent 35%),
          radial-gradient(circle at 85% 30%, rgba(123, 97, 255, 0.16), transparent 35%),
          radial-gradient(circle at 30% 70%, rgba(74, 163, 255, 0.12), transparent 40%),
          repeating-linear-gradient(
            120deg,
            rgba(255, 255, 255, 0.03),
            rgba(255, 255, 255, 0.03) 1px,
            transparent 1px,
            transparent 10px
          );
        filter: blur(0.2px);
        opacity: 0.85;
        pointer-events: none;
        animation: twinkle 9s ease-in-out infinite alternate;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 20% 25%, rgba(255, 255, 255, 0.16) 0 1px, transparent 1.5px),
          radial-gradient(circle at 70% 30%, rgba(255, 255, 255, 0.12) 0 1px, transparent 1.5px),
          radial-gradient(circle at 40% 70%, rgba(255, 255, 255, 0.13) 0 1px, transparent 1.5px),
          radial-gradient(circle at 85% 75%, rgba(255, 255, 255, 0.14) 0 1px, transparent 1.5px),
          radial-gradient(circle at 55% 15%, rgba(255, 255, 255, 0.12) 0 1px, transparent 1.5px),
          radial-gradient(700px 500px at 50% 30%, transparent 45%, rgba(0, 0, 0, 0.55) 100%);
        background-size: 100% 100%;
        opacity: 0.92;
        filter: blur(0.25px);
        pointer-events: none;
        animation: fogDrift 20s ease-in-out infinite alternate;
      }

      .fog {
        position: fixed;
        inset: -10%;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(520px 220px at 20% 40%, rgba(177, 207, 255, 0.1), transparent 60%),
          radial-gradient(460px 210px at 75% 65%, rgba(148, 182, 255, 0.1), transparent 60%),
          radial-gradient(420px 190px at 55% 30%, rgba(205, 225, 255, 0.08), transparent 60%);
        filter: blur(12px);
        opacity: 0.55;
        animation: mistMove 18s ease-in-out infinite alternate;
      }

      @keyframes twinkle {
        0% {
          opacity: 0.75;
        }
        100% {
          opacity: 0.95;
        }
      }

      @keyframes fogDrift {
        0% {
          transform: translateX(0) translateY(0);
        }
        100% {
          transform: translateX(-10px) translateY(8px);
        }
      }

      @keyframes mistMove {
        0% {
          transform: translateX(-8px) translateY(-3px) scale(1);
        }
        100% {
          transform: translateX(12px) translateY(6px) scale(1.04);
        }
      }

      .wrap {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(16px, 3vw, 32px);
        position: relative;
        z-index: 1;
      }

      .card {
        width: min(920px, 100%);
        background: linear-gradient(180deg, var(--card), var(--card2));
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 20px 70px var(--shadow);
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: radial-gradient(500px 240px at 15% 0%, rgba(74, 163, 255, 0.35), transparent 60%),
          radial-gradient(500px 240px at 85% 10%, rgba(123, 97, 255, 0.28), transparent 60%);
        opacity: 0.55;
        pointer-events: none;
      }

      .inner {
        position: relative;
        padding: clamp(18px, 4vw, 40px);
        display: grid;
        grid-template-columns: 1.25fr 0.75fr;
        gap: clamp(14px, 3vw, 24px);
        align-items: center;
      }

      @media (max-width: 820px) {
        .inner {
          grid-template-columns: 1fr;
        }
      }

      .title {
        margin: 0 0 10px;
        font-size: clamp(34px, 5.2vw, 62px);
        letter-spacing: 0.5px;
        line-height: 1.05;
        text-shadow:
          0 8px 28px rgba(0, 0, 0, 0.45),
          0 0 16px rgba(74, 163, 255, 0.35),
          0 0 32px rgba(123, 97, 255, 0.25);
      }

      .title span {
        display: inline-block;
        background: linear-gradient(90deg, #a7d7ff 0%, var(--accent) 35%, #c3a7ff 70%, var(--accent2) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: titleGlow 2.8s ease-in-out infinite alternate;
      }

      .title .icon {
        margin-right: 10px;
        filter: drop-shadow(0 0 8px rgba(108, 173, 255, 0.75));
        animation: turtleFloat 2.2s ease-in-out infinite;
      }

      @keyframes titleGlow {
        0% {
          filter: drop-shadow(0 0 6px rgba(74, 163, 255, 0.48));
        }
        100% {
          filter: drop-shadow(0 0 14px rgba(123, 97, 255, 0.58));
        }
      }

      @keyframes turtleFloat {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-2px);
        }
        100% {
          transform: translateY(0);
        }
      }

      .subtitle {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: clamp(14px, 1.8vw, 18px);
        line-height: 1.7;
      }

      .rules {
        margin: 0;
        padding: 0;
        list-style: decimal;
        list-style-position: inside;
        display: grid;
        gap: 12px;
      }

      .rule {
        border: 1px solid rgba(74, 163, 255, 0.22);
        border-left: 4px solid rgba(74, 163, 255, 0.68);
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.03);
        color: rgba(232, 242, 255, 0.86);
        line-height: 1.8;
        font-size: clamp(14px, 1.8vw, 17px);
        letter-spacing: 0.2px;
      }

      .panel {
        border: 1px solid rgba(180, 210, 255, 0.16);
        background: rgba(2, 10, 28, 0.28);
        border-radius: 16px;
        padding: 16px;
      }

      .panel h3 {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.6px;
        color: rgba(232, 242, 255, 0.9);
        text-transform: uppercase;
      }

      .startRow {
        display: grid;
        gap: 12px;
      }

      .btn {
        appearance: none;
        border: 1px solid rgba(74, 163, 255, 0.45);
        background: linear-gradient(180deg, rgba(74, 163, 255, 0.25), rgba(74, 163, 255, 0.08));
        color: var(--text);
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0.4px;
        cursor: pointer;
        position: relative;
        box-shadow: 0 14px 38px rgba(0, 0, 0, 0.35);
        transform: translateY(0);
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .btn::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 14px;
        background: radial-gradient(240px 100px at 20% 20%, rgba(74, 163, 255, 0.35), transparent 55%),
          radial-gradient(240px 100px at 80% 30%, rgba(123, 97, 255, 0.26), transparent 55%);
        opacity: 0;
        transition: opacity 180ms ease;
        pointer-events: none;
      }

      .btn:hover {
        transform: translateY(-2px);
        border-color: rgba(74, 163, 255, 0.75);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.48);
        background: linear-gradient(180deg, rgba(74, 163, 255, 0.34), rgba(74, 163, 255, 0.11));
      }

      .btn:hover::before {
        opacity: 1;
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn[aria-busy="true"] {
        cursor: wait;
        opacity: 0.92;
      }

      .hint {
        color: rgba(232, 242, 255, 0.7);
        font-size: 13px;
        line-height: 1.5;
        margin: 0;
      }

      .meta {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(180, 210, 255, 0.14);
        background: rgba(255, 255, 255, 0.03);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: rgba(74, 163, 255, 0.95);
        box-shadow: 0 0 18px rgba(74, 163, 255, 0.65);
      }

      .chip strong {
        font-size: 13px;
        letter-spacing: 0.2px;
      }

      .chip span {
        color: rgba(232, 242, 255, 0.72);
        font-size: 12px;
      }

      .footer {
        text-align: center;
        margin-top: 14px;
        color: rgba(232, 242, 255, 0.55);
        font-size: 12px;
      }

      .status {
        min-height: 20px;
        color: rgba(232, 242, 255, 0.75);
        font-size: 13px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="fog" aria-hidden="true"></div>
    <main class="wrap">
      <section class="card" aria-label="AI海龟汤欢迎页">
        <div class="inner">
          <div>
            <h1 class="title">
              <span><span class="icon" aria-hidden="true">🐢</span>AI海龟汤</span>
            </h1>
            <p class="subtitle">
              进入一场推理游戏：你只能通过提问获取线索，用“为什么/怎么会”一步步逼近真相。
              每轮都像一只海龟：越慢越接近答案。
            </p>

            <ul class="rules" aria-label="游戏规则简介">
              <li class="rule">每个谜题由一段叙述和若干线索构成。</li>
              <li class="rule">你可以通过提问来缩小范围，直到推理出结论。</li>
              <li class="rule">疑点越清晰，答案越接近。保持逻辑与耐心。</li>
            </ul>
          </div>

          <aside class="panel" aria-label="开始游戏区">
            <h3>Ready to Guess</h3>
            <div class="startRow">
              <button id="startBtn" class="btn" type="button" aria-busy="false">
                开始游戏
              </button>
              <div class="status" id="status" role="status" aria-live="polite"></div>
              <p class="hint">
                提示：如果项目里已经有 `game.html`，将自动跳转开始。否则会给出提示信息。
              </p>
              <div class="meta" aria-hidden="true">
                <div class="chip">
                  <span class="dot"></span>
                  <div>
                    <strong>深蓝悬疑</strong><br />
                    <span>界面为暗色/低亮环境优化</span>
                  </div>
                </div>
              </div>
            </div>
            <div class="footer">© AI海龟汤 欢迎页</div>
          </aside>
        </div>
      </section>
    </main>

    <script>
      /**
       * 尝试加载并跳转到游戏页面；若不存在则提示用户。
       * @returns {Promise<void>}
       */
      async function tryRedirectToGame() {
        const statusEl = document.getElementById("status");
        const startBtn = document.getElementById("startBtn");

        if (!statusEl || !startBtn) return;

        startBtn.setAttribute("aria-busy", "true");
        statusEl.textContent = "正在唤醒海龟……";

        try {
          // HEAD 在部分本地静态环境可能不可靠，所以使用普通 GET 但不读取 body。
          const res = await fetch("game.html", { method: "GET", cache: "no-store" });
          if (res && res.ok) {
            statusEl.textContent = "已找到游戏页面，跳转中……";
            window.location.href = "game.html";
            return;
          }

          statusEl.textContent = "未找到 `game.html`。请先创建游戏页面后再开始。";
          startBtn.setAttribute("aria-busy", "false");
        } catch (err) {
          // 本地直接双击 HTML 也可能导致 fetch 受限；给出友好提示。
          statusEl.textContent = "无法加载 `game.html`（可能未创建或环境限制）。";
          startBtn.setAttribute("aria-busy", "false");
        }
      }

      /**
       * 绑定“开始游戏”按钮点击事件。
       * @returns {void}
       */
      function bindStartButton() {
        const startBtn = document.getElementById("startBtn");
        if (!startBtn) return;
        startBtn.addEventListener("click", () => {
          // 避免重复点击导致多次请求。
          if (startBtn.getAttribute("aria-busy") === "true") return;
          void tryRedirectToGame();
        });
      }

      bindStartButton();
    </script>
  </body>
</html>
